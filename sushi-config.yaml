id: de.gematik.hddt
canonical: https://gematik.de/fhir/hddt
version: 1.0.0-rc2
name: HealthDeviceDataTransfer
title: Health Device Data Transfer
status: active
publisher: 
  name: gematik GmbH
  url: https://www.gematik.de
description: This specification describes the technical  semantic approach for providing vital signs (vibW) using blood glucose, Continuous glucose monitoring, lung function testing and blood pressure as an example, according to § 374a SGB V.
license: CC0-1.0
fhirVersion: 4.0.1
copyrightYear: 2025+
releaseLabel: release
language: en
copyright: gematik GmbH



dependencies:
  hl7.fhir.uv.cgm: 1.0.0
  de.basisprofil.r4: 1.5.4

parameters:
  no-narrative:
    - "Bundle/*"
    - "Observation/*"
    - "Device/*"
    - "DeviceMetric/*"
    - "DeviceDefinition/*"
    - "Patient/*"
    - "OperationOutcome/*"
  no-validate:
    - "DeviceDefinition/*"  
  show-inherited-invariants: true
  # in order to preserve the version of the resources:
  apply-version: true
  shownav: true
  apply-contact: true
  default-contact: true
  apply-publisher: true
  default-publisher: true
  propagate-status: false
  special-url-base: https://terminologien.bfarm.de/fhir
  # logging: [init, progress, tx, generate]




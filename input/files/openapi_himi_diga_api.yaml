openapi: 3.0.3
info:
  title: Health Device Data Transfer FHIR API
  version: "1.0.0"
  description: >
    OpenAPI specification for a Health Device Data Transfer FHIR API (FHIR R4).
    Supports CapabilityStatement, Observation, DeviceMetric, and Device resources.

tags:
  - name: Metadata
  - name: Observation
  - name: DeviceMetric
  - name: Device

components:
  parameters:
    AcceptHeader:
      name: Accept
      in: header
      required: true
      schema:
        type: string
        enum: ["application/fhir+json", "application/fhir+xml"]
      description: >
        Content type expected in the response. FHIR servers must support
        at least `application/fhir+json`.
    ContentTypeHeader:
      name: Content-Type
      in: header
      required: true
      schema:
        type: string
        enum: ["application/fhir+json", "application/fhir+xml"]
      description: >
        Content type of the request body. Required for POST/PUT/PATCH requests.
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      description: >
        OAuth2 Bearer token (RFC 6750).  
        Format: `Authorization: Bearer <access_token>`.
    XRequestIdHeader:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
      description: >
        Unique request identifier, provided by the client for traceability.

paths:
  /metadata:
    get:
      tags: [Metadata]
      summary: FHIR CapabilityStatement (public)
      description: >
        Public endpoint (no mTLS) that declares supported FHIR version,
        resources, interactions, search parameters, and profiles.
      responses:
        '200':
          description: CapabilityStatement
          content:
            application/fhir+json:
              examples:
                capabilityJson:
                  summary: Minimal CapabilityStatement (JSON)
                  value:
                    resourceType: CapabilityStatement
                    status: active
                    fhirVersion: "4.0.1"
                    format: ["json","xml"]
                    rest:
                      - mode: server
                        resource:
                          - type: Device
                            profile: "Device_Medical_Aid"
                            interaction:
                              - code: read
                              - code: search-type
                          - type: Observation
                            profile: "Observation_Blood_Glucose"
                            interaction:
                              - code: read
                              - code: search-type
                          - type: Observation
                            profile: "Observation_CGM_Measurement_Series"
                            interaction:
                              - code: read
                              - code: search-type
                          - type: Bundle
                            profile: "BundleSearchSummaryDataMeasurements"
                            interaction:
                              - code: read
                              - code: search-type
          
  /Observation:
    get:
      tags: [Observation]
      summary: Query Observations
      description: >
        Supports querying single values, time series data, and threshold comparisons.
        Data must conform to the `Observation_Blood_Glucose` or `Observation_CGM_Measurement_Series` profiles.
      parameters:
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"
        - in: query
          name: _id
          schema: { type: string }
          description: >
            Unique Observation ID (server-generated).  
            Example: `_id=obs-blood-glucose-001`
        - in: query
          name: code
          schema: { type: string }
          description: >
            LOINC code specifying the measurement type.  
            Example: `code=http://loinc.org|15074-8` (Glucose [Moles/volume] in Blood).
        - in: query
          name: date
          schema: { type: string, format: date-time }
          description: >
            Effective time of the measurement.  
            Supports FHIR search prefixes (`ge`, `le`, `eq`).  
            Example: `date=ge2025-08-01T00:00:00Z`
      responses:
        '200':
          description: Bundle of Observation resources
          content:
            application/fhir+json:
              examples:
                observationBloodGlucoseJson:
                  summary: Blood Glucose Observation JSON
                  value:
                    {
                      "resourceType": "Observation",
                      "id": "obs-blood-glucose-001",
                      "status": "final",
                      "code": {
                        "coding": [
                          {
                            "system": "http://loinc.org",
                            "code": "2339-0",
                            "display": "Glucose [Mass/volume] in Blood"
                          }
                        ]
                      },
                      "effectiveDateTime": "2025-08-28T10:00:00Z",
                      "valueQuantity": {
                        "value": 120,
                        "unit": "mg/dL",
                        "system": "http://unitsofmeasure.org",
                        "code": "mg/dL"
                      }
                    }
                observationCGMJson:
                  summary: CGM Measurement Series Observation JSON
                  value:
                    resourceType: Observation
                    id: obs-cgm-series-001
                    status: preliminary
                    code:
                      coding:
                        - system: http://loinc.org
                          code: "105272-9"
                          display: Glucose [Moles/volume] in Interstitial fluid
                    effectivePeriod:
                      start: "2025-08-28T08:00:00Z"
                      end: "2025-08-28T10:00:00Z"
                    valueSampledData:
                      origin:
                        value: 0
                        unit: mmol/L
                      period: 300
                      data: "5.6 5.8 6.0 5.9 5.7"
        '400':
          description: Invalid request
        '404':
          description: Measurement not found or is in state UNKNOWN or INITIALIZED
        '403':
          description: Not allowed
        '500':
          description: Any other error       
  /DeviceMetric:
    get:
      tags: [DeviceMetric]
      summary: Query DeviceMetric (restricted)
      description: >
        DeviceMetric resources must conform to the `DeviceMetric_Medical_Aid` profile.
      parameters:
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"
        - in: query
          name: _id
          description: DeviceMetric internal ID
          schema: { type: string }
      responses:
        '200':
          description: DeviceMetric resource
          content:
            application/fhir+json:
              examples:
                deviceMetricJson:
                  summary: DeviceMetric JSON
                  value:
                    resourceType: DeviceMetric
                    id: dm-123
                    type:
                      coding:
                        - system: http://loinc.org
                          code: "15074-8"
                          display: Blood glucose measurement
                    unit:
                      coding:
                        - system: http://unitsofmeasure.org
                          code: "mg/dL"
                          display: milligrams per deciliter
            
        '403':
          description: Forbidden – DeviceMetric not authorized for this client
        '401':
          description: Unauthorized

  /Device:
    get:
      tags: [Device]
      summary: Query Device resources
      description: >
        Retrieve device instances conforming to the `Device_Medical_Aid` profile.
      parameters:
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"
        - in: query
          name: _id
          description: Device ID
          schema: { type: string }
      responses:
        '200':
          description: Bundle of Device resources
          content:
            application/fhir+json:
              examples:
                deviceJson:
                  summary: Device JSON
                  value:
                    resourceType: Bundle
                    type: searchset
                    entry:
                      - resource:
                          resourceType: Device
                          id: dev-123
                          serialNumber: SN123456
                          type:
                            coding:
                              - system: http://snomed.info/sct
                                code: "46702002"
                                display: Glucometer
                          manufacturer: Acme Health
            

  /$search-summary-data-measurement:
    post:
      tags: [Observation]
      summary: Custom operation to search summary data measurements
      description: >
        This operation searches for Observations and optionally includes related Device and DeviceMetric resources.
        The result conforms to the `BundleSearchSummaryDataMeasurements` profile.
      parameters:
      - $ref: "#/components/parameters/AcceptHeader"
      - $ref: "#/components/parameters/ContentTypeHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
      - $ref: "#/components/parameters/XRequestIdHeader"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Measurement code to filter by.
                effectivePeriodStart:
                  type: string
                  format: date-time
                  description: Start of the effective period.
                effectivePeriodEnd:
                  type: string
                  format: date-time
                  description: End of the effective period.
      responses:
        '200':
          description: Result bundle containing search summary data measurements and optionally related resources
          content:
            application/fhir+json:
              examples:
                aggregateBundleJson:
                  summary: CGM Summary Bundle Example
                  value:
                    resourceType: Bundle
                    type: collection
                    entry:
                      - resource:
                          resourceType: Observation
                          id: cgmSummaryExample
                          status: final
                          category:
                            - coding:
                                - system: http://terminology.hl7.org/CodeSystem/observation-category
                                  code: laboratory
                          code:
                            coding:
                              - system: http://hl7.org/fhir/uv/cgm/CodeSystem/cgm-summary-codes-temporary
                                code: cgm-summary
                          subject:
                            reference: Patient/patientExample
                          effectivePeriod:
                            start: 2024-05-01
                            end: 2024-05-31
                          hasMember:
                            - reference: Observation/cgmSummaryMeanGlucoseMassPerVolumeExample
                            - reference: Observation/cgmSummaryTimesInRangesExample
                            - reference: Observation/cgmSummaryGMIExample
                            - reference: Observation/cgmSummaryCoefficientOfVariationExample
                            - reference: Observation/cgmSummaryDaysOfWearExample
                            - reference: Observation/cgmSummarySensorActivePercentageExample

openapi: 3.0.3
info:
  title: Health Device Data Transfer FHIR API
  version: "1.0.0"
  description: |
    OpenAPI specification for a Health Device Data Transfer FHIR API (FHIR R4).
    Supports CapabilityStatement, Observation, DeviceMetric, and Device resources.
    
    ## Search Parameter Types
    - **token**: Exact match searches for coded values and identifiers
    - **date**: Date/datetime searches with [FHIR prefixes](https://hl7.org/fhir/R4/search.html#prefix) (eq, ne, lt, le, gt, ge)
    - **reference**: References to other FHIR resources
    - **string**: Text-based searches with partial matching support
    
    ## Authentication & Authorization
    All endpoints (except /metadata) require OAuth2 Bearer token authentication.
    Clients must have appropriate scopes for accessing specific resource types and operations.
    
    ## Content-type
    - The server **MUST** support headers `Content-type` and `Accept`
    - The server **MUST** support interpreting content types `application/fhir+json` and `application/fhir+xml`.
    - The server **MUST** return the response in the format that was requested from the client application.

x-swagger-ui-config:
  supportedSubmitMethods: []

tags:
  - name: Metadata
  - name: Observation
  - name: DeviceMetric
  - name: Device

components:
  parameters:
    AcceptHeader:
      name: Accept
      in: header
      required: true
      schema:
        type: string
        enum: ["application/fhir+json", "application/fhir+xml"]
      description: >
        Content type expected in the response. FHIR servers must support
        at least `application/fhir+json`.
    ContentTypeHeader:
      name: Content-Type
      in: header
      required: true
      schema:
        type: string
        enum: ["application/fhir+json", "application/fhir+xml"]
      description: >
        Content type of the request body. Required for POST/PUT/PATCH requests.
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      description: >
        OAuth2 Bearer token (RFC 6750).  
        Format: `Authorization: Bearer <access_token>`.
    XRequestIdHeader:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
      description: >
        Unique request identifier, provided by the client for traceability.

paths:
  /metadata:
    get:
      tags: [Metadata]
      summary: FHIR CapabilityStatement (public)
      description: |
        ### No Authentication Required
        This endpoint is publicly accessible (no mTLS) to allow clients to discover server capabilities before authentication.
      
        ### Capability Information Provided
        - Supported FHIR version and formats
        - Available resource types and profiles
        - Supported interactions (read, search, create, etc.)
        - Search parameters for each resource type
        - Operation definitions
        

        
      responses:
        '200':
          description: CapabilityStatement
          content:
            application/fhir+json:
              examples:
                capabilityJson:
                  summary: Minimal CapabilityStatement (JSON)
                  value:
                    resourceType: CapabilityStatement
                    status: active
                    fhirVersion: "4.0.1"
                    format: ["json","xml"]
                    rest:
                      - mode: server
                        resource:
                          - type: Device
                            profile: "Device_Medical_Aid"
                            interaction:
                              - code: read
                              - code: search-type
                          - type: Observation
                            profile: "Observation_Blood_Glucose"
                            interaction:
                              - code: read
                              - code: search-type
                          - type: Observation
                            profile: "Observation_CGM_Measurement_Series"
                            interaction:
                              - code: read
                              - code: search-type
                          - type: Bundle
                            profile: "BundleSearchSummaryDataMeasurements"
                            interaction:
                              - code: read
                              - code: search-type
          
  /Observation:
    get:
      tags: [Observation]
      summary: Query Observations
      description: |
        Supports querying [Observation](https://hl7.org/fhir/R4/observation.html) resources related to blood glucose measurements.  
        This endpoint can return either single-point measurements (e.g., fingerstick blood glucose) or time series data (e.g., continuous glucose monitoring [CGM] data). 
        
        Returned resources **MUST** conform to one of the following FHIR profiles:  
        - [Observation_Blood_Glucose](StructureDefinition-Observation-Blood-Glucose.html)  
        - [Observation_CGM_Measurement_Series](StructureDefinition-Observation-CGM-Measurement-Series.html)  
        
        ### Search Parameters
        
        | Parameter | Type | Description |
        | --------- | ---- | ----------- |
        | `_id` | token | The Observation resource identifier. |
        | `_include` | Observation:device | Ensures the resulting Bundle also contains the DeviceMetric resources referenced by `Observation.device`. |
        | `code` | token | The observation code (e.g., LOINC code for blood or tissue glucose). |
        | `date` | date | Filters results based on `Observation.effective[x]` (date or dateTime). |
        
        ### Response
        
        - Returns a Bundle of Observation resources that match the given criteria.  
        - Example responses include:  
          - Single blood glucose measurement (point-in-time `valueQuantity`).  
          - Continuous glucose monitoring series (`valueSampledData` across a time range).  
            
        
        
      parameters:
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"
        
      responses:
        '200':
          description: Bundle of Observation resources
          content:
            application/fhir+json:
              examples:
                observationBloodGlucoseJson:
                  summary: Blood Glucose Observation JSON
                  value:
                    {
                      "resourceType": "Observation",
                      "id": "obs-blood-glucose-001",
                      "status": "final",
                      "code": {
                        "coding": [
                          {
                            "system": "http://loinc.org",
                            "code": "2339-0",
                            "display": "Glucose [Mass/volume] in Blood"
                          }
                        ]
                      },
                      "effectiveDateTime": "2025-08-28T10:00:00Z",
                      "valueQuantity": {
                        "value": 120,
                        "unit": "mg/dL",
                        "system": "http://unitsofmeasure.org",
                        "code": "mg/dL"
                      }
                    }
                observationCGMJson:
                  summary: CGM Measurement Series Observation JSON
                  value:
                    resourceType: Observation
                    id: obs-cgm-series-001
                    status: preliminary
                    code:
                      coding:
                        - system: http://loinc.org
                          code: "105272-9"
                          display: Glucose [Moles/volume] in Interstitial fluid
                    effectivePeriod:
                      start: "2025-08-28T08:00:00Z"
                      end: "2025-08-28T10:00:00Z"
                    valueSampledData:
                      origin:
                        value: 0
                        unit: mmol/L
                      period: 300
                      data: "5.6 5.8 6.0 5.9 5.7"
        '400':
          description: |
            | Message | Type | Reason |
            |---------|------|--------|
            | Invalid Query Parameters | [OperationOutcome] | Wrong format of query parameters |
            | Unknown Search Parameters | [OperationOutcome] | Unsupported search parameter |
            | Invalid Request | [OperationOutcome] | Any other reasons |
            ---
            
        '404':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Resource not found | [OperationOutcome] | Requesting a resource with a specific `_id` that does not exist. |
        '401':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Unauthorized | [string] | Missing, invalid, or expired credentials. |
        '403':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Forbidden | [OperationOutcome] | Client does not have permissions for resource "Observation". |
        '500':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Any other error | [string] | For internal server errors, etc. |    
  /DeviceMetric:
    get:
      tags: [DeviceMetric]
      summary: Query DeviceMetric (restricted)
      description: |
        Supports querying [DeviceMetric](https://hl7.org/fhir/R4/devicemetric.html) resources, primarily to obtain calibration status or to access the linked [Device](https://hl7.org/fhir/R4/device.html).  

        Returned resources **MUST** conform to the [DeviceMetric_Medical_Aid](StructureDefinition-DeviceMetric-Personal-Health-Device.html) profile.  
        
        - The endpoint **MUST** allow requesting a specific DeviceMetric resource by its internal `_id`.  
        - The endpoint **MUST** allow including the referenced Device resource via DeviceMetric.source.  
        - The endpoint **MUST NOT** support any additional search parameters.  
        
        ### Search Parameters
        
        | Parameter | Type | Description |
        | --------- | ---- | ----------- |
        | `_id` | token | The DeviceMetric resource identifier. |
        | `_include` | DeviceMetric:source | Ensures the resulting Bundle also contains the referenced Device resource. |
        
        ### Response
        
        - Returns either a single DeviceMetric resource (if called at `/DeviceMetric/_id`), or a Bundle containing one DeviceMetric resource, optionally including a Device.  
        - Example responses include:  
          - A DeviceMetric resource with calibration status.  
          - The referenced Device resource included via `_include`.  
        
      parameters:
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"

      responses:
        '200':
          description: DeviceMetric resource
          content:
            application/fhir+json:
              examples:
                deviceMetricJson:
                  summary: DeviceMetric JSON
                  value:
                    resourceType: DeviceMetric
                    id: dm-123
                    type:
                      coding:
                        - system: http://loinc.org
                          code: "15074-8"
                          display: Blood glucose measurement
                    calibration:
                      state: calibrated
                    source:
                      reference: Device/66
            
        '400':
          description: |
            | Message | Type | Reason |
            |---------|------|--------|
            | Invalid Query Parameters | [OperationOutcome] | Wrong format of query parameters |
            | Unknown Search Parameters | [OperationOutcome] | Unsupported search parameter |
            | Invalid Request | [OperationOutcome] | Any other reasons |
            ---
            
        '404':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Resource not found | [OperationOutcome] | Requesting a resource with a specific `_id` that does not exist. |
        '401':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Unauthorized | [string] | Missing, invalid, or expired credentials. |
        '403':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Forbidden | [OperationOutcome] | Client does not have permissions for resource "DeviceMetric". |
        '500':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Any other error | [string] | For internal server errors, etc. | 

  /Device:
    get:
      tags: [Device]
      summary: Query Device resources
      description: |
        Supports querying [Device](https://hl7.org/fhir/R4/device.html) resources in order to view device details such as name, manufacturer, serial number, and configuration.  

        Returned resources **MUST** conform to the [Device_Medical_Aid](StructureDefinition-Device-Personal-Health-Device.html) profile.  
        
        - The endpoint **MUST** allow requesting a specific Device resource by its internal `_id`.  
        - The endpoint **MUST** allow including the referenced parent Device resource via `Device.parent`.  
        - The endpoint **MUST NOT** support any additional search parameters.  
        
        ### Search Parameters
        
        | Parameter | Type | Description |
        | --------- | ---- | ----------- |
        | `_id` | token | The Device resource identifier. |
        | `_include` | Device:parent | Ensures the resulting Bundle also contains the referenced parent Device resource. |
        
        ### Response
        
        - Returns either a single Device resource (if called at `/Device/_id`), or a Bundle containing one Device resource. 
        - Example responses include:  
          - A single Device resource with identifiers, manufacturer, and serial number.  
          - The referenced parent Device resource included via `_include`.  
        
      parameters:
        - $ref: "#/components/parameters/AcceptHeader"
        - $ref: "#/components/parameters/AuthorizationHeader"

      responses:
        '200':
          description: Bundle of Device resources
          content:
            application/fhir+json:
              examples:
                deviceJson:
                  summary: Device JSON
                  value:
                    resourceType: Bundle
                    type: searchset
                    entry:
                      - resource:
                          resourceType: Device
                          id: dev-123
                          serialNumber: SN123456
                          type:
                            coding:
                              - system: http://snomed.info/sct
                                code: "46702002"
                                display: Glucometer
                          manufacturer: Acme Health
        '400':
          description: |
            | Message | Type | Reason |
            |---------|------|--------|
            | Invalid Query Parameters | [OperationOutcome] | Wrong format of query parameters |
            | Unknown Search Parameters | [OperationOutcome] | Unsupported search parameter |
            | Invalid Request | [OperationOutcome] | Any other reasons |
            ---
            
        '404':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Resource not found | [OperationOutcome] | Requesting a resource with a specific `_id` that does not exist. |
        '401':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Unauthorized | [string] | Missing, invalid or expired credentials. |
        '403':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Forbidden | [OperationOutcome] | Client does not have permissions for resource "Device". |
        '500':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Any other error | [string] | For internal server errors, etc. | 
            

  /$search-summary-data-measurement:
    post:
      tags: [Observation]
      summary: Custom operation to search summary data measurements
      description: |
        Supports the custom FHIR operation **$search-summary-data-measurement** to obtain aggregated measurement data.  
        Optionally, related Device and DeviceMetric resources can be included in the result.  
        
        
        Results **MUST** conform to the [BundleSearchSummaryDataMeasurements](StructureDefinition-Bundle-Search-Summary-Data-Measurements.html) profile.  
        
        ### Request Parameters
        
        All parameters are provided in the request body as JSON, following the [FHIR Parameters](https://hl7.org/fhir/R4/parameters.html) resource pattern.  
        
        | Parameter | Type | Required | Description |
        |-----------|------|----------|-------------|
        | `effectivePeriodStart` | dateTime | No | Start of the effective time period. |
        | `effectivePeriodEnd` | dateTime | No | End of the effective time period. |
        | `related` | boolean | No | When set to true, includes Device resources from which the data was measured and DeviceMetric resources for calibration status. |
        
        ### Response
        
        - Returns a Bundle containing summary measurement Observations, and optionally related Device and DeviceMetric resources.  
        - Example responses include:  
          - Aggregated CGM summary data (e.g., mean glucose, times in ranges, GMI). 
          
      parameters:
      - $ref: "#/components/parameters/AcceptHeader"
      - $ref: "#/components/parameters/ContentTypeHeader"
      - $ref: "#/components/parameters/AuthorizationHeader"
      - $ref: "#/components/parameters/XRequestIdHeader"
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
              properties:
                resourceType:
                  type: string
                  enum: ["Parameters"]
                  description: Must be "Parameters" for FHIR operations
                parameter:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      valueString:
                        type: string
                      valueDateTime:
                        type: string
                        format: date-time
                      valueBoolean:
                        type: boolean
                      valueReference:
                        type: object
                        properties:
                          reference:
                            type: string
            example:
              resourceType: "Parameters"
              parameter:
                - name: "effectivePeriodStart"
                  valueDateTime: "2025-08-01T00:00:00Z"
                - name: "effectivePeriodEnd"
                  valueDateTime: "2025-08-31T23:59:59Z"
                - name: "related"
                  valueBoolean: true
      responses:
        '200':
          description: Return a Bundle, containing search summary data measurements and optionally related resources
          content:
            application/fhir+json:
              examples:
                aggregateBundleJson:
                  summary: CGM Summary Bundle Example
                  value:
                    resourceType: Bundle
                    type: collection
                    entry:
                      - resource:
                          resourceType: Observation
                          id: cgmSummaryExample
                          status: final
                          category:
                            - coding:
                                - system: http://terminology.hl7.org/CodeSystem/observation-category
                                  code: laboratory
                          code:
                            coding:
                              - system: http://hl7.org/fhir/uv/cgm/CodeSystem/cgm-summary-codes-temporary
                                code: cgm-summary
                          subject:
                            reference: Patient/patientExample
                          effectivePeriod:
                            start: 2025-08-01
                            end: 2025-08-31
                          hasMember:
                            - reference: Observation/cgmSummaryMeanGlucoseMassPerVolumeExample
                            - reference: Observation/cgmSummaryTimesInRangesExample
                            - reference: Observation/cgmSummaryGMIExample
                            - reference: Observation/cgmSummaryCoefficientOfVariationExample
                            - reference: Observation/cgmSummaryDaysOfWearExample
                            - reference: Observation/cgmSummarySensorActivePercentageExample
        '400':
          description: |
            | Message | Type | Reason |
            |---------|------|--------|
            | Unknown Parameters | [OperationOutcome] | Unsupported parameters were provided |
            | Not a Parameters-Resource | [OperationOutcome] | The request body is not in the FHIR-Paremeters format |
            | Invalid Request | [OperationOutcome] | Any other reason |
            ---
            
        '401':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Unauthorized | [string] | Missing, invalid, or expired credentials. |
        '403':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Forbidden | [OperationOutcome] | Client does not have permissions to see the results of this operation. |
        '500':
          description: |
            | Message | Type | Reason |
            |-|-|-|
            | Any other error | [string] | For internal server errors, etc. | 

name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
    tags:
      - "*"

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write  

concurrency:
  group: "pages"
  cancel-in-progress: true    

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5                

      - name: Build IG with Dockerfile
        run: |
          docker build \
            --target export \
            --output type=local,dest=. \
            -f Dockerfile .

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./output            

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "/output"      # Path to your static files in the repo
          api_location: ""             # No API
          output_location: ""          # Not needed unless you run a build (leave empty for plain HTML)

      - name: Zip /output
        run: |
          test -d output || { echo "'output' directory not found"; ls -la; exit 1; }
          (cd output && zip -r ../output.zip .)
          ls -lh output.zip

      - name: Create GitHub Release for this tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}           # the tag you pushed (e.g. v1.2.3)
          name: "Release ${{ github.ref_name }}"
          body: |
            Automated release for tag ${{ github.ref_name }}.
            Run: #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
          files: output.zip
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4                

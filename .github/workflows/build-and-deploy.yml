name: Build and Deploy to Github-Pages

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Job
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build IG with Dockerfile
        run: |
          docker build \
            --target export \
            --output type=local,dest=. \
            -f Dockerfile .

      - name: Validate output
        run: |
          test -d output || { echo "'output' directory not found"; ls -la; exit 1; }
          ls -la output

      - name: Publish output to gh-pages branch
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./output
          force_orphan: true

      - name: Upload artifact for GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - name: Zip /output
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          (cd output && zip -r ../output.zip .)
          ls -lh output.zip

      - name: Create GitHub Release for this tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            Automated release for tag ${{ github.ref_name }}.
            Run: #${{ github.run_number }}
            Commit: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
          files: output.zip
          draft: false
          prerelease: false
          generate_release_notes: false

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
